name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Restaurar cache do Android SDK
        uses: actions/cache@v4
        with:
          path: .buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk-33-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-33-
            ${{ runner.os }}-android-sdk-

      - name: Compilar APK (imagem oficial do Kivy)
        run: |
          docker run --rm -v "$PWD":/home/user/hostcwd kivy/buildozer:latest /bin/bash -lc '
            set -euo pipefail

            # Use SDK under the project workspace so it can be cached by the runner
            SDK_ROOT=/home/user/hostcwd/.buildozer/android/platform/android-sdk
            SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

            mkdir -p "$SDK_ROOT"

            # If cmdline-tools are missing, download & install them into the SDK_ROOT
            if [ ! -x "$SDKMANAGER" ]; then
              echo "Installing Android command line tools..."
              curl -sSL -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
              unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
              mkdir -p "$SDK_ROOT/cmdline-tools/latest"
              mv /tmp/cmdline-tools/cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/"
            fi

            # Install/ensure required SDK components (adjust versions to match your buildozer.spec android.api)
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" "platform-tools" "build-tools;33.0.2" "platforms;android-33"

            # Accept licenses (non-interactive)
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses || true

            # Ensure we run inside the project directory
            cd /home/user/hostcwd

            # Build with buildozer
            buildozer android debug
          '

      - name: Salvar cache do Android SDK
        uses: actions/cache@v4
        with:
          path: .buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk-33-${{ hashFiles('**/buildozer.spec') }}

      - name: Disponibilizar o APK para download
        uses: actions/upload-artifact@v4
        with:
          name: meu-cofre-apk
          path: bin/*.apk
