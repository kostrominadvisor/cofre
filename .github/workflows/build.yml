name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Baixar o codigo
        uses: actions/checkout@v4

      - name: Restaurar cache do Android SDK
        uses: actions/cache@v4
        with:
          path: .buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk-33-${{ hashFiles('**/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-33-
            ${{ runner.os }}-android-sdk-

      - name: Compilar APK (imagem oficial do Kivy)
        run: |
          docker run --rm -v "$PWD":/home/user/hostcwd -w /home/user/hostcwd --entrypoint /bin/bash kivy/buildozer:latest -lc '
            set -euo pipefail

            # Diretório SDK dentro do workspace (para cache)
            SDK_ROOT=/home/user/hostcwd/.buildozer/android/platform/android-sdk
            mkdir -p "$SDK_ROOT"

            # Garantir que unzip e curl estão disponíveis (algumas imagens podem não ter)
            if ! command -v unzip >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
              echo "Instalando dependências (unzip, curl) dentro do container..."
              apt-get update -y >/dev/null || true
              apt-get install -y unzip curl >/dev/null || true
            fi

            # Tentar localizar sdkmanager em locais comuns
            if [ -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
              SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            elif [ -x "$SDK_ROOT/cmdline-tools/tools/bin/sdkmanager" ]; then
              SDKMANAGER="$SDK_ROOT/cmdline-tools/tools/bin/sdkmanager"
            else
              SDKMANAGER=""
            fi

            # Se não houver sdkmanager, baixar command-line tools e instalar no SDK_ROOT
            if [ -z "$SDKMANAGER" ]; then
              echo "Instalando Android command line tools..."
              curl -sSL -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
              unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
              mkdir -p "$SDK_ROOT/cmdline-tools/latest"
              # mover conteúdo - lidar com variações na estrutura do zip
              if [ -d /tmp/cmdline-tools/cmdline-tools ]; then
                mv /tmp/cmdline-tools/cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/" || true
              else
                mv /tmp/cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/" || true
              fi
              SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
            fi

            # Assegurar que SDKMANAGER é executável
            if [ ! -x "$SDKMANAGER" ]; then
              chmod +x "$SDKMANAGER" || true
            fi

            # Instalar/garantir componentes necessários (ajuste as versões se seu buildozer.spec exigir outra api/build-tools)
            echo "Instalando componentes SDK (platform-tools, build-tools;33.0.2, platforms;android-33)..."
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" "platform-tools" "build-tools;33.0.2" "platforms;android-33" || true

            # Aceitar licenças (não-interativo)
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses || true

            # Ir para diretório do projeto
            cd /home/user/hostcwd

            # Executar buildozer (ajuste o alvo se necessário)
            echo "Iniciando buildozer..."
            # Evitar prompt interativo caso algo ainda detecte root
            yes | buildozer android debug || (echo "buildozer falhou — ver logs acima" && exit 1)
          '

      - name: Garantir permissões do cache Android SDK
        if: always()
        run: |
          # Se o cache foi criado pelo container como root, ajeitamos dono para o runner
          chown -R "$(id -u):$(id -g)" .buildozer/android/platform/android-sdk || true

      - name: Salvar cache do Android SDK
        uses: actions/cache@v4
        with:
          path: .buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-android-sdk-33-${{ hashFiles('**/buildozer.spec') }}

      - name: Disponibilizar o APK para download
        uses: actions/upload-artifact@v4
        with:
          name: meu-cofre-apk
          path: bin/*.apk
